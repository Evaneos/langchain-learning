<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="btn-border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-btn">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>
  <rect width="800" height="200" rx="12" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Connection lines — start/end on circle edges -->
  <!-- 01→02 -->
  <line x1="117" y1="94.5" x2="197" y2="69" stroke="#34d399" stroke-width="1.5" opacity="0.4"/>
  <!-- 01→03 -->
  <line x1="117" y1="105.5" x2="197" y2="131" stroke="#34d399" stroke-width="1.5" opacity="0.4"/>
  <!-- 02→04 -->
  <line x1="224" y1="67" x2="306" y2="78" stroke="#38bdf8" stroke-width="1.5" opacity="0.35"/>
  <!-- 03→05 -->
  <line x1="224" y1="133" x2="306" y2="122" stroke="#38bdf8" stroke-width="1.5" opacity="0.35"/>
  <!-- 04→junction→06 -->
  <line x1="334" y1="83" x2="365" y2="100" stroke="#fb923c" stroke-width="1.5" opacity="0.3"/>
  <!-- 05→junction→06 -->
  <line x1="334" y1="117" x2="365" y2="100" stroke="#fb923c" stroke-width="1.5" opacity="0.3"/>
  <!-- junction→06 -->
  <line x1="365" y1="100" x2="396" y2="100" stroke="#fb923c" stroke-width="1.5" opacity="0.3"/>

  <!-- LangChain nodes (green) — 01, 02, 03 -->
  <circle cx="100" cy="100" r="18" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="2" filter="url(#glow-green)"/>
  <text x="100" y="100" text-anchor="middle" dominant-baseline="central" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="11" font-weight="600">01</text>

  <circle cx="210" cy="65" r="14" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="1.5" filter="url(#glow-green)"/>
  <text x="210" y="65" text-anchor="middle" dominant-baseline="central" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="10" font-weight="600">02</text>

  <circle cx="210" cy="135" r="14" fill="rgba(52,211,153,0.08)" stroke="#34d399" stroke-width="1.5" filter="url(#glow-green)"/>
  <text x="210" y="135" text-anchor="middle" dominant-baseline="central" fill="#6ee7b7" font-family="system-ui,sans-serif" font-size="10" font-weight="600">03</text>

  <!-- LangGraph nodes (blue) — 04, 05 -->
  <circle cx="320" cy="80" r="14" fill="rgba(56,189,248,0.06)" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow-blue)"/>
  <text x="320" y="80" text-anchor="middle" dominant-baseline="central" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="10" font-weight="600">04</text>

  <circle cx="320" cy="120" r="14" fill="rgba(56,189,248,0.06)" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow-blue)"/>
  <text x="320" y="120" text-anchor="middle" dominant-baseline="central" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="10" font-weight="600">05</text>

  <!-- DeepAgents node (orange) — 06 -->
  <circle cx="410" cy="100" r="14" fill="rgba(251,146,60,0.06)" stroke="#fb923c" stroke-width="1.5" filter="url(#glow-orange)"/>
  <text x="410" y="100" text-anchor="middle" dominant-baseline="central" fill="#fdba74" font-family="system-ui,sans-serif" font-size="10" font-weight="600">06</text>

  <!-- Decorative dots (fading trail) -->
  <circle cx="445" cy="100" r="2" fill="#fb923c" opacity="0.3"/>
  <circle cx="460" cy="100" r="1.5" fill="#fb923c" opacity="0.2"/>
  <circle cx="472" cy="100" r="1" fill="#fb923c" opacity="0.1"/>

  <!-- Right side — centered on x=630 -->

  <!-- Title -->
  <text x="630" y="68" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5">Learning Map</text>

  <!-- Legend — centered on x=630 -->
  <circle cx="516" cy="95" r="4" fill="#34d399" opacity="0.8"/>
  <text x="525" y="95" dominant-baseline="central" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">LangChain</text>
  <circle cx="596" cy="95" r="4" fill="#38bdf8" opacity="0.8"/>
  <text x="605" y="95" dominant-baseline="central" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">LangGraph</text>
  <circle cx="679" cy="95" r="4" fill="#fb923c" opacity="0.8"/>
  <text x="688" y="95" dominant-baseline="central" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">DeepAgents</text>

  <!-- CTA button — gradient border pill -->
  <rect x="560" y="120" width="140" height="32" rx="16" fill="url(#btn-border)" opacity="0.35" filter="url(#glow-btn)"/>
  <rect x="561.5" y="121.5" width="137" height="29" rx="14.5" fill="#0f1623"/>
  <text x="630" y="136" text-anchor="middle" dominant-baseline="central" fill="#c8d5e3" font-family="system-ui,sans-serif" font-size="12" font-weight="500">Explore skill tree →</text>
</svg>