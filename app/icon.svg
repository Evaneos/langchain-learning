<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <defs>
    <clipPath id="bottom">
      <rect x="0" y="16" width="32" height="16"/>
    </clipPath>
  </defs>

  <!-- Back: full indigo link -->
  <circle cx="20" cy="16" r="7" fill="none" stroke="#818cf8" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Middle: full emerald link (on top at top intersection) -->
  <circle cx="12" cy="16" r="7" fill="none" stroke="#34d399" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Front: bottom half of indigo link (on top at bottom intersection) -->
  <circle cx="20" cy="16" r="7" fill="none" stroke="#818cf8" stroke-width="2.8" stroke-linecap="round" clip-path="url(#bottom)"/>
</svg>
